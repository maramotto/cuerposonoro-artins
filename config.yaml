# cuerposonoro-jetson configuration
# All tunable parameters live here. No magic numbers in code.

vision:
  model: "yolov8n-pose"
  confidence_threshold: 0.5
  input_size: 640
  use_tensorrt: true      # Set false on Mac (no TensorRT), true on Jetson
  tensorrt_half: true      # FP16 on Ampere GPU — faster, negligible accuracy loss

silence:
  velocity_threshold: 0.008
  timeout_ms: 500

melody:
  channel: 0           # MIDI channel 0 (displayed as ch1)
  program: 11          # vibraphone (GM program 11)
  note_min: 48         # C3
  note_max: 84         # C6
  velocity_min: 30
  velocity_max: 120
  trigger_threshold: 0.018
  brightness_cc: 74
  note_cooldown_ms: 150      # minimum ms between note-on events (rate limiter)

bass:
  channel: 1           # MIDI channel 1 (displayed as ch2)
  program: 32          # acoustic bass (GM program 32)
  trigger_threshold: 0.018
  velocity: 100

harmony:
  torso_tilt_threshold: 0.05
  head_tilt_threshold: 0.04
  chord_progression:
    - name: "Dm9"
      root: 62          # D
      notes: [62, 65, 69, 72, 76]       # D F A C E
      simplified: [62, 65, 69]           # Dm triad
      tension: [62, 65, 69, 72, 76, 77] # Dm11 (add G)
    - name: "G13sus4"
      root: 67          # G
      notes: [67, 72, 74, 76, 81]       # G C D E A
      simplified: [67, 72, 74]           # Gsus4
      tension: [67, 72, 74, 76, 81, 83] # G13sus4 + B
    - name: "Cmaj7#11"
      root: 60          # C
      notes: [60, 64, 67, 71, 78]       # C E G B F#
      simplified: [60, 64, 67, 71]      # Cmaj7
      tension: [60, 64, 67, 71, 74, 78] # Cmaj13#11 (add D)
    - name: "Fmaj9"
      root: 65          # F
      notes: [65, 69, 72, 76, 79]       # F A C E G
      simplified: [65, 69, 72]           # F triad
      tension: [65, 69, 72, 76, 79, 82] # Fmaj9#11 (add B)
    - name: "Bø7"
      root: 71          # B
      notes: [71, 74, 77, 81]           # B D F A
      simplified: [71, 74, 77]          # Bdim triad
      tension: [71, 74, 77, 81, 84]    # Bø9 (add C#)
    - name: "E7alt"
      root: 64          # E
      notes: [64, 68, 70, 75, 78]       # E G# Bb Eb F#
      simplified: [64, 68, 71]           # E major triad
      tension: [64, 68, 70, 73, 75, 78] # E7alt + b9 (add F)

fluidsynth:
  soundfont: "JJazzLab-SoundFont.sf2"
  gain: 2.0
  sample_rate: 44100
  driver: "pulseaudio"     # "coreaudio" on Mac, "pulseaudio" on Jetson

camera:
  device_id: 0             # Camera index for cv2.VideoCapture

midi:
  port_name: "cuerposonoro"

# Jetson MIDI mode — velocity-driven, sustained notes, hysteresis filtering
jetson:
  hysteresis_frames: 2
  note_cooldown_ms: 150      # minimum ms between note-on events (rate limiter)

# Realtime MIDI mode — per-keypoint, D minor pentatonic, optimised for Jetson 18fps
# Thresholds in normalised coordinates [0,1] — 0.015 ≈ 8px at 640x480
realtime:
  min_velocity: 0.007        # ignore jitter below this (normalised coords)
  hysteresis_frames: 2       # must exceed threshold for N consecutive frames
  silence_frames: 18         # release note after N frames of stillness (~1s at 18fps)
  velocity_max: 0.15         # movement beyond this maps to max MIDI velocity
  note_cooldown_ms: 150      # minimum ms between note-on events per keypoint
  midi_velocity_min: 40
  midi_velocity_max: 120
  programs:
    melody:
      channel: 0
      program: 11            # vibraphone
    bass:
      channel: 1
      program: 32            # acoustic bass
  keypoints:
    right_wrist:
      index: 10
      channel: 0             # melody
      note_min: 74           # D5
      note_max: 86           # D6
    left_wrist:
      index: 9
      channel: 0             # melody
      note_min: 62           # D4
      note_max: 74           # D5
    right_ankle:
      index: 16
      channel: 1             # bass
      note_min: 38           # D2
      note_max: 50           # D3
    left_ankle:
      index: 15
      channel: 1             # bass
      note_min: 38           # D2
      note_max: 50           # D3

# Gesture MIDI mode — direction-based, 3 voices, Re dorian
# Movement direction maps to scale steps; energy to volume; duration to articulation
gesture:
  min_velocity: 0.005        # below this = stillness (normalised coords)
  hysteresis_frames: 2       # consistent direction for N frames before triggering
  silence_frames: 18         # release note after N still frames (~1s at 18fps)
  velocity_max: 0.15         # max velocity for CC7/step mapping
  staccato_frames: 3         # frames_active < this = staccato (immediate noteoff)
  sustain_frames: 4          # frames_active >= this = reverb tail on release
  reverb_cc91: 80            # CC91 value for sustained notes
  note_cooldown_ms: 150      # minimum ms between note-on events per voice
  programs:
    arms:
      channel: 0
      program: 11            # vibraphone
    center:
      channel: 1
      program: 32            # acoustic bass



